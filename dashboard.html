<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Atas de Reunião</title>
  <meta name="theme-color" content="#1a5c35">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Dashboard Atas">
  <style>
    :root {
      --green:      #1a5c35;
      --green-mid:  #2d7a4a;
      --green-lite: #e8f5ee;
      --green-pale: #f0faf4;
      --text:       #111827;
      --muted:      #6b7280;
      --border:     #e5e7eb;
      --bg:         #f3f4f6;
      --white:      #ffffff;
      --radius:     14px;
      --radius-sm:  9px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; }

    /* Header */
    .hdr { background: var(--green); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
    .hdr-left { display: flex; align-items: center; gap: 12px; }
    .hdr-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .hdr-title { color: #fff; font-size: 17px; font-weight: 700; }
    .hdr-sub { color: rgba(255,255,255,0.65); font-size: 12px; }
    .nova-ata-btn { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.4); color: #fff; border-radius: var(--radius-sm); padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; font-family: inherit; }
    .nova-ata-btn:hover { background: rgba(255,255,255,0.25); }

    /* Content */
    .page { max-width: 900px; margin: 0 auto; padding: 20px 16px 40px; }
    .mes-titulo { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 14px; }

    /* Summary cards */
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
    .stat { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .stat-num { font-size: 28px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .stat-num.verde { color: #1a5c35; }
    .stat-num.laranja { color: #b45309; }
    .stat-num.vermelho { color: #dc2626; }
    .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; }

    /* Area cards */
    .section-title { font-size: 16px; font-weight: 700; color: var(--text); margin: 24px 0 12px; }

    .area-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
    .area-card.em_dia   { border-left: 4px solid #1a5c35; }
    .area-card.parcial  { border-left: 4px solid #d97706; }
    .area-card.atrasada { border-left: 4px solid #dc2626; }
    .area-card.sem_periodicidade { border-left: 4px solid #d1d5db; }

    .area-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; }
    .area-header:hover { background: var(--bg); }
    .area-left { display: flex; align-items: center; gap: 10px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-verde   { background: #1a5c35; }
    .dot-parcial { background: #d97706; }
    .dot-vermelho{ background: #dc2626; }
    .dot-cinza   { background: #d1d5db; }
    .area-nome { font-size: 15px; font-weight: 700; color: var(--text); }
    .area-freq { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .area-right { display: flex; align-items: center; gap: 12px; }
    .progress-pill { display: flex; align-items: center; gap: 6px; }
    .pill-bar { width: 80px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .pill-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .fill-verde   { background: #1a5c35; }
    .fill-parcial { background: #d97706; }
    .fill-vermelho{ background: #dc2626; }
    .pill-text { font-size: 12px; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .status-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
    .badge-verde   { background: #dcfce7; color: #1a5c35; }
    .badge-parcial { background: #fef3c7; color: #92400e; }
    .badge-vermelho{ background: #fee2e2; color: #dc2626; }
    .badge-cinza   { background: var(--bg); color: var(--muted); }
    .chevron { color: var(--muted); font-size: 18px; transition: transform 0.2s; }
    .chevron.open { transform: rotate(180deg); }

    /* Atas list inside card */
    .atas-list { border-top: 1px solid var(--border); }
    .ata-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--bg); gap: 12px; }
    .ata-item:last-child { border-bottom: none; }
    .ata-data { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
    .ata-pessoas { font-size: 12px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ata-acoes-badge { font-size: 11px; background: var(--green-lite); color: var(--green); border-radius: 20px; padding: 2px 8px; white-space: nowrap; font-weight: 600; }
    .ver-pdf { font-size: 12px; color: var(--green); font-weight: 600; text-decoration: none; white-space: nowrap; border: 1px solid var(--green-lite); background: var(--green-lite); padding: 4px 10px; border-radius: var(--radius-sm); }
    .ver-pdf:hover { background: #d0edda; }
    .sem-reunioes { padding: 14px 16px; font-size: 13px; color: var(--muted); font-style: italic; }

    /* Loading */
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 500px) {
      .summary { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-num { font-size: 22px; }
      .pill-bar { width: 50px; }
      .status-badge { display: none; }
    }

    @media (prefers-color-scheme: dark) {
      :root { --bg: #111827; --white: #1f2937; --text: #f9fafb; --muted: #9ca3af; --border: #374151; --green-lite: #052e16; --green-pale: #041f10; }
    }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-icon">🌿</div>
    <div>
      <div class="hdr-title">Dashboard de Reuniões</div>
      <div class="hdr-sub">Orgânico do Chico</div>
    </div>
  </div>
  <a class="nova-ata-btn" href="/index.html">+ Nova ata</a>
</div>

<div class="page">
  <div id="conteudo">
    <div class="loading">
      <div class="spinner"></div><br>
      Carregando dados...
    </div>
  </div>
</div>

<script>
const APP_SCRIPT_URL = "COLE_A_URL_DO_APP_SCRIPT_AQUI";

const STATUS_LABEL = {
  em_dia:           { texto: "Em dia",       classe: "badge-verde",   dot: "dot-verde",    fill: "fill-verde",    borda: "em_dia"   },
  parcial:          { texto: "Parcial",       classe: "badge-parcial", dot: "dot-parcial",  fill: "fill-parcial",  borda: "parcial"  },
  atrasada:         { texto: "Atrasada",      classe: "badge-vermelho",dot: "dot-vermelho", fill: "fill-vermelho", borda: "atrasada" },
  sem_periodicidade:{ texto: "Sob demanda",   classe: "badge-cinza",   dot: "dot-cinza",    fill: "",              borda: "sem_periodicidade" },
};

function fmtData(str) {
  if (!str) return "—";
  return new Date(str + "T12:00:00").toLocaleDateString("pt-BR", { day:"2-digit", month:"short" });
}

async function carregar() {
  try {
    const r    = await fetch(`${APP_SCRIPT_URL}?action=dashboard`);
    const data = await r.json();
    renderizar(data);
  } catch (e) {
    document.getElementById("conteudo").innerHTML =
      `<div class="loading" style="color:#dc2626">Erro ao carregar dados.<br><small>${e.message}</small></div>`;
  }
}

function renderizar(data) {
  const { mes, areas, acoes } = data;

  const totalRealizadas = areas.reduce((s, a) => s + a.realizadas, 0);
  const totalEsperadas  = areas.reduce((s, a) => s + a.esperadas, 0);

  let html = `<div class="mes-titulo">${mes}</div>`;

  // Cards de resumo
  html += `
    <div class="summary">
      <div class="stat">
        <div class="stat-num verde">${totalRealizadas}/${totalEsperadas}</div>
        <div class="stat-label">Reuniões realizadas</div>
      </div>
      <div class="stat">
        <div class="stat-num ${acoes.atrasadas > 0 ? "vermelho" : "laranja"}">${acoes.pendentes}</div>
        <div class="stat-label">Ações pendentes</div>
      </div>
      <div class="stat">
        <div class="stat-num ${acoes.atrasadas > 0 ? "vermelho" : "verde"}">${acoes.atrasadas}</div>
        <div class="stat-label">Ações atrasadas</div>
      </div>
    </div>`;

  html += `<div class="section-title">Áreas</div>`;

  areas.forEach((area, idx) => {
    const s    = STATUS_LABEL[area.status];
    const pct  = area.esperadas > 0 ? Math.min(100, Math.round((area.realizadas / area.esperadas) * 100)) : 0;
    const freq = area.frequencia === "Sem reunião periódica" ? "Sob demanda" : area.frequencia;

    html += `
      <div class="area-card ${s.borda}" id="card-${idx}">
        <div class="area-header" onclick="toggleCard(${idx})">
          <div class="area-left">
            <div class="status-dot ${s.dot}"></div>
            <div>
              <div class="area-nome">${area.area}</div>
              <div class="area-freq">${freq}</div>
            </div>
          </div>
          <div class="area-right">
            ${area.esperadas > 0 ? `
              <div class="progress-pill">
                <div class="pill-bar"><div class="pill-fill ${s.fill}" style="width:${pct}%"></div></div>
                <div class="pill-text">${area.realizadas}/${area.esperadas}</div>
              </div>` : ""}
            <span class="status-badge ${s.classe}">${s.texto}</span>
            <span class="chevron" id="chev-${idx}">▾</span>
          </div>
        </div>
        <div class="atas-list" id="list-${idx}" style="display:none">
          ${area.atas.length === 0
            ? `<div class="sem-reunioes">Nenhuma reunião registrada este mês.</div>`
            : area.atas.map(a => `
                <div class="ata-item">
                  <div class="ata-data">${fmtData(a.data)}</div>
                  <div class="ata-pessoas">${a.participantes}</div>
                  ${a.qtdAcoes > 0 ? `<div class="ata-acoes-badge">${a.qtdAcoes} ação(ões)</div>` : ""}
                  ${a.link ? `<a class="ver-pdf" href="${a.link}" target="_blank">📄 PDF</a>` : ""}
                </div>`).join("")
          }
        </div>
      </div>`;
  });

  document.getElementById("conteudo").innerHTML = html;
}

function toggleCard(idx) {
  const list = document.getElementById(`list-${idx}`);
  const chev = document.getElementById(`chev-${idx}`);
  const open = list.style.display === "none";
  list.style.display = open ? "block" : "none";
  chev.classList.toggle("open", open);
}

carregar();
setInterval(carregar, 60000); // atualiza a cada minuto
</script>
</body>
</html>
